<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harga Emas Hari Ini</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1473/1473504.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --gold-rich:   #C9972A;
      --gold-bright: #E8B84B;
      --gold-light:  #F5D782;
      --dark:        #1A1208;
      --dark-card:   rgba(38,22,5,0.95);
      --dark-card2:  rgba(22,12,2,0.97);
      --text-muted:  #7A5C28;
      --up:          #7EC8A0;
      --up-bg:       rgba(126,200,160,0.08);
      --down:        #E07A6A;
      --down-bg:     rgba(224,122,106,0.08);
      --flat:        #A89060;
      --flat-bg:     rgba(168,144,96,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--dark);
      color: var(--gold-light);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #3a2406 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, #2a1a04 0%, transparent 60%),
        repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(200,150,40,.025) 2px, rgba(200,150,40,.025) 4px);
      z-index: 0; pointer-events: none;
    }

    .wrapper {
      position: relative; z-index: 1;
      max-width: 700px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    /* ── Ornament ── */
    .ornament {
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .ornament::before, .ornament::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-rich), transparent);
    }
    .ornament span { font-size: 16px; color: var(--gold-bright); letter-spacing: 4px; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 44px; animation: fadeDown .8s ease both; }
    .subtitle { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: var(--gold-rich); margin-bottom: 12px; }
    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(24px, 5.5vw, 42px);
      font-weight: 600; letter-spacing: 3px; line-height: 1.15;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-bright) 50%, var(--gold-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 8px;
    }
    .tagline {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--text-muted); letter-spacing: 1px;
    }

    /* ── Loading ── */
    .loading { text-align: center; padding: 60px 0; }
    .spinner {
      width: 44px; height: 44px;
      border: 2px solid rgba(232,184,75,.12); border-top-color: var(--gold-bright);
      border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 18px;
    }
    .loading p {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      color: var(--text-muted); font-size: 15px;
    }

    /* ── Error ── */
    .error-box {
      border: 1px solid rgba(224,122,106,.3); border-radius: 4px;
      padding: 20px; text-align: center; color: #E07A6A; font-size: 14px; display: none;
    }

    /* ── Cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .card {
      background: linear-gradient(150deg, var(--dark-card) 0%, var(--dark-card2) 100%);
      border: 1px solid rgba(200,150,40,.18);
      border-radius: 6px;
      padding: 24px 22px 20px;
      position: relative; overflow: hidden;
      text-decoration: none; color: inherit; display: block;
      transition: border-color .3s, transform .3s, box-shadow .3s;
      animation: fadeUp .7s ease both;
    }
    .card:nth-child(1) { animation-delay: .1s; }
    .card:nth-child(2) { animation-delay: .2s; }
    .card:nth-child(3) { animation-delay: .3s; }
    .card:nth-child(4) { animation-delay: .4s; }

    /* top shimmer line */
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-bright), transparent);
      opacity: 0; transition: opacity .3s;
    }
    .card:hover {
      border-color: rgba(200,150,40,.5);
      transform: translateY(-3px);
      box-shadow: 0 14px 44px rgba(0,0,0,.45), 0 0 24px rgba(200,150,40,.07);
    }
    .card:hover::before { opacity: 1; }

    /* ── Brand logo — top right ── */
    .card-logo {
      position: absolute;
      top: 1px;
      right: 18px;
      width: 120px;
      height: 120px;
      object-fit: contain;
      object-position: center;
      opacity: 0.08;
      filter: grayscale(100%) brightness(5);
      transition: opacity .35s;
      pointer-events: none;
      user-select: none;
    }
    .card:hover .card-logo { opacity: 0.16; }

    /* Brand label — leave room for logo on the right */
    .card-brand {
      font-family: 'Cinzel', serif;
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold-rich);
      margin-bottom: 20px;
      padding-right: 64px; /* clear the logo */
    }

    /* Price label */
    .card-price-label {
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 4px;
    }

    /* Main price */
    .card-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(30px, 5.5vw, 40px);
      font-weight: 600; color: var(--gold-light);
      line-height: 1; letter-spacing: 1px;
      margin-bottom: 8px; /* FIX: was 3px — added breathing room */
    }

    /* Per gram label */
    .card-unit {
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--gold-rich); opacity: 0.7;
      font-family: 'Raleway', sans-serif; font-weight: 400;
      margin-bottom: 20px; /* FIX: clear gap before divider */
    }

    /* Thin divider */
    .card-divider {
      height: 1px; margin-bottom: 14px;
      background: linear-gradient(90deg, rgba(200,150,40,.2), transparent);
    }

    /* Previous + delta row */
    .card-meta {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }

    .card-prev { display: flex; flex-direction: column; gap: 2px; }
    .card-prev-label {
      font-size: 8.5px; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--text-muted);
    }
    .card-prev-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px; font-weight: 400;
      color: rgba(245,215,130,.40);
      letter-spacing: .5px;
      text-decoration: line-through;
      text-decoration-color: rgba(245,215,130,.18);
    }

    /* Delta badge */
    .card-delta {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border-radius: 3px;
      font-size: 12px; font-weight: 500; letter-spacing: .5px;
      font-family: 'Raleway', sans-serif;
      white-space: nowrap;
    }
    .card-delta.up   { background: var(--up-bg);   color: var(--up);   border: 1px solid rgba(126,200,160,.18); }
    .card-delta.down { background: var(--down-bg); color: var(--down); border: 1px solid rgba(224,122,106,.18); }
    .card-delta.flat { background: var(--flat-bg); color: var(--flat); border: 1px solid rgba(168,144,96,.18); }
    .delta-arrow { font-size: 10px; line-height: 1; }

    /* Source link */
    .card-footer { margin-top: 16px; display: flex; align-items: center; justify-content: flex-end; }
    .card-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--gold-rich); transition: color .2s, gap .2s;
    }
    .card-link svg { width: 9px; height: 9px; transition: transform .2s; }
    .card:hover .card-link { color: var(--gold-bright); gap: 8px; }
    .card:hover .card-link svg { transform: translate(2px, -2px); }

    /* ── Section divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,150,40,.22), transparent);
      margin: 36px 0;
    }

    /* ── Footer ── */
    .meta { text-align: center; animation: fadeUp .7s ease .5s both; }
    .meta-updated {
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-size: 14px; color: var(--text-muted); margin-bottom: 6px;
    }
    .meta-updated strong { color: var(--gold-rich); font-style: normal; font-weight: 400; }
    .meta-note {
      font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(122,92,40,.5);
    }

    /* ── Animations ── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(18px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }

    /* ── Mobile ── */
    @media (max-width: 500px) {
      .wrapper { padding: 32px 14px 60px; }
      .cards { grid-template-columns: 1fr; gap: 11px; }
      .card { padding: 20px 18px 16px; }
      .card-logo { width: 80px; height: 80px; top: 14px; right: 14px; }
      .card-brand { padding-right: 54px; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="subtitle">Real-time Market Data</p>
    <div class="ornament"><span>✦</span></div>
    <h1>Harga Emas<br>Hari Ini</h1>
    <div class="ornament" style="margin-top:12px;margin-bottom:12px;"><span>✦</span></div>
    <p class="tagline">Live gold prices — updated automatically</p>
  </header>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Memuat harga emas terkini…</p>
  </div>

  <div class="error-box" id="error">Gagal memuat data. Silakan coba beberapa saat lagi.</div>

  <div id="content" style="display:none">
    <div class="cards" id="cards"></div>
    <div class="divider"></div>
    <div class="meta">
      <p class="meta-updated" id="lastUpdated"></p>
      <p class="meta-note">Harga berlaku per 1 gram &middot; Sumber resmi masing-masing brand</p>
    </div>
  </div>

</div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbyKE_NIKrIdTo7JThintRzchC8pwMeLm7wM1j1lmcm48Pgt-gLCiMqpVHt7sY7InmfUKA/exec';

  const BRANDS = {
    antam:    { label:'ANTAM',     url:'https://www.logammulia.com/id/harga-emas-hari-ini',  logo:'https://deltarekaprimasakti.com/wp-content/uploads/2018/12/ANTAM.png' },
    hrta:     { label:'HRTA',      url:'https://hrtagold.id/en/gold-price',                  logo:'https://hrtagold.id/_next/image?url=%2Ficons%2Fhrtagold-main.png&w=3840&q=75' },
    galeri24: { label:'GALERI 24', url:'https://galeri24.co.id/harga-emas',                  logo:'https://galeri24.co.id/favicon.png' },
    ubs:      { label:'UBS',       url:'https://ubslifestyle.com/harga-buyback-hari-ini/',   logo:'https://lh6.googleusercontent.com/proxy/rMRhba7DZWDSHGF2URoAyHbDRbD3wTNBxoeHpOmYTtbLz6fspBxz87SiqvhwiDvIxHaezk0qqQOh54ZdS3Dw-0XWRmqLxdvZNw' },
  };

  const formatRp = n => 'Rp\u00A0' + Number(n).toLocaleString('id-ID');

  const deltaClass = s => s > 0 ? 'up' : s < 0 ? 'down' : 'flat';
  const deltaArrow = s => s > 0 ? '▲' : s < 0 ? '▼' : '—';
  const deltaText  = s => {
    if (s === 0) return 'Stabil';
    return (s > 0 ? '+' : '-') + 'Rp\u00A0' + Number(Math.abs(s)).toLocaleString('id-ID');
  };

  async function load() {
    try {
      const res  = await fetch(API);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const cardsEl = document.getElementById('cards');
      cardsEl.innerHTML = '';

      for (const [key, info] of Object.entries(BRANDS)) {
        const h = data.harga[key];
        const sekarang   = typeof h === 'object' ? h.sekarang   : h;
        const sebelumnya = typeof h === 'object' ? h.sebelumnya : null;
        const selisih    = typeof h === 'object' ? h.selisih    : null;

        const prevBlock = sebelumnya !== null ? `
          <div class="card-divider"></div>
          <div class="card-meta">
            <div class="card-prev">
              <span class="card-prev-label">Sebelumnya</span>
              <span class="card-prev-value">${formatRp(sebelumnya)}</span>
            </div>
            <span class="card-delta ${deltaClass(selisih)}">
              <span class="delta-arrow">${deltaArrow(selisih)}</span>
              ${deltaText(selisih)}
            </span>
          </div>
        ` : '';

        const card = document.createElement('a');
        card.className = 'card';
        card.href      = info.url;
        card.target    = '_blank';
        card.rel       = 'noopener noreferrer';
        card.innerHTML = `
          <img class="card-logo" src="${info.logo}" alt="${info.label} logo" loading="lazy" />
          <p class="card-brand">${info.label}</p>
          <p class="card-price-label">Harga Sekarang</p>
          <p class="card-price">${formatRp(sekarang)}</p>
          <p class="card-unit">per gram &middot; IDR</p>
          ${prevBlock}
          <div class="card-footer">
            <span class="card-link">
              Lihat sumber
              <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 9L9 1M9 1H3M9 1V7"/>
              </svg>
            </span>
          </div>
        `;
        cardsEl.appendChild(card);
      }

      document.getElementById('lastUpdated').innerHTML =
        'Diperbarui: <strong>' + data.update_terakhir + '</strong>';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display   = 'block';
      console.error(e);
    }
  }

  load();
</script>
</body>
</html>
